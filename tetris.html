<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Build</title>
    <style>
        /* Oily Dark Theme CSS */
        body {
            background-color: #121212;
            color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .game-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 2rem;
        }

        /* The Left Panel */
        .score-panel {
            background: #1e1e1e;
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px solid #2a2a2d;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
            min-width: 140px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-panel h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.3rem;
            color: #ffffff;
        }

        .score-panel .value {
            font-size: 2rem;
            color: #3498db;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        #next-piece {
            background-color: #000000;
            border: 2px solid #3498db;
            border-radius: 4px;
            margin-bottom: 1rem;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
            display: block;
        }

        /* High Score Board Styling */
        .high-scores-container {
            margin-top: 1rem;
            width: 100%;
            border-top: 1px solid #333;
            padding-top: 1rem;
        }

        .high-scores-container h2 {
            color: #f1c40f;
            font-size: 1.2rem;
        }

        #score-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
            font-size: 1rem;
            color: #bdc3c7;
        }

        #score-list li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.3rem;
            border-bottom: 1px dashed #333;
        }

        .canvas-container {
            position: relative;
        }

        #tetris {
            border: 2px solid #3498db;
            background-color: #000000;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
            border-radius: 4px;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(18, 18, 18, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            text-align: center;
            padding: 20px;
        }

        #game-over-screen {
            border: 2px solid #e74c3c;
        }

        #pause-screen {
            border: 2px solid #f1c40f;
        }

        .hidden {
            display: none !important;
        }

        .overlay h2 {
            font-size: 2.5rem;
            margin-top: 0;
        }

        #game-over-screen h2 {
            color: #e74c3c;
        }

        #pause-screen h2 {
            color: #f1c40f;
        }

        .action-btn {
            background: #1e1e1e;
            color: #3498db;
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            border: 1px solid #3498db;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .action-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(52, 152, 219, 0.25);
            color: #ffffff;
        }

        /* Name Input Form */
        #name-input-section input {
            background: #0a0a0a;
            color: #fff;
            border: 1px solid #3498db;
            border-radius: 4px;
            padding: 0.5rem;
            font-size: 1.2rem;
            text-align: center;
            width: 80%;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        /* --- MOBILE CONTROLS & RESPONSIVENESS --- */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 300px;
            user-select: none;
        }

        .control-btn {
            background: #1e1e1e;
            color: #3498db;
            border: 2px solid #2a2a2d;
            border-radius: 8px;
            padding: 15px 0;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            background: #3498db;
            color: #ffffff;
        }

        /* Updated D-Pad Layout to include Hard Drop */
        #btn-rotate {
            grid-column: 2;
            grid-row: 1;
        }

        #btn-left {
            grid-column: 1;
            grid-row: 2;
        }

        #btn-down {
            grid-column: 2;
            grid-row: 2;
        }

        #btn-right {
            grid-column: 3;
            grid-row: 2;
        }

        #btn-hard-drop {
            grid-column: 1 / span 3;
            grid-row: 3;
            padding: 10px 0;
            font-size: 1.5rem;
        }

        /* Spans across the bottom */

        @media (max-width: 1024px) {
            body {
                padding: 10px 0;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 5px;
            }

            .game-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                width: 100%;
            }

            .score-panel {
                flex-direction: row;
                flex-wrap: wrap;
                /* Allows the high score board to drop to the next line */
                justify-content: center;
                align-items: center;
                width: 95%;
                padding: 10px;
                gap: 15px;
                min-width: unset;
            }

            .score-panel h2 {
                font-size: 0.9rem;
                margin: 0;
            }

            .score-panel .value {
                font-size: 1.2rem;
                margin: 0;
            }

            #next-piece {
                margin-bottom: 0;
                width: 40px;
                height: 40px;
            }

            #pause-btn {
                margin-top: 0;
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
                width: auto;
            }

            .high-scores-container {
                width: 100%;
                margin-top: 0.5rem;
                padding-top: 0.5rem;
            }

            #tetris {
                max-height: 50vh;
                width: auto;
            }

            .mobile-controls {
                display: grid !important;
                margin-top: 5px;
                max-width: 260px;
            }

            .control-btn {
                padding: 10px 0;
            }
        }
    </style>
</head>

<body>

    <h1>Tetris</h1>

    <div class="game-wrapper">
        <div class="score-panel">
            <div>
                <h2>Score</h2>
                <div id="score" class="value">0</div>
            </div>
            <div>
                <h2>Level</h2>
                <div id="level" class="value">1</div>
            </div>
            <div>
                <h2>Next</h2>
                <canvas id="next-piece" width="120" height="120"></canvas>
            </div>
            <button id="pause-btn" class="action-btn">Pause</button>

            <div class="high-scores-container">
                <h2>Top 5</h2>
                <ul id="score-list">
                </ul>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="canvas-container">
                <canvas id="tetris" width="300" height="600"></canvas>

                <div id="pause-screen" class="overlay hidden">
                    <h2>PAUSED</h2>
                </div>

                <div id="game-over-screen" class="overlay hidden">
                    <h2 id="game-over-title">GAME OVER</h2>
                    <p style="font-size: 1.2rem;">Final Score</p>
                    <div id="final-score" class="value" style="font-size: 2.5rem; color: #3498db; margin-bottom: 1rem;">
                        0</div>

                    <div id="name-input-section" class="hidden">
                        <p style="color: #f1c40f; font-weight: bold; margin-bottom: 5px;">NEW HIGH SCORE!</p>
                        <input type="text" id="player-name" maxlength="10" placeholder="ENTER NAME">
                        <button id="save-score-btn" class="action-btn">Save Score</button>
                    </div>

                    <button id="restart-btn" class="action-btn" style="width: auto;">Play Again</button>
                </div>
            </div>

            <div class="mobile-controls">
                <button id="btn-rotate" class="control-btn">↻</button>
                <button id="btn-left" class="control-btn">←</button>
                <button id="btn-down" class="control-btn">↓</button>
                <button id="btn-right" class="control-btn">→</button>
                <button id="btn-hard-drop" class="control-btn">⤓ HARD DROP</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 🔴 PASTE YOUR ACTUAL FIREBASE CONFIG HERE 🔴
        const firebaseConfig = {
            apiKey: "AIzaSyDUsWeV3roJE7GGtcuIOfZt9l5gWf0VOpk",
            authDomain: "tetris-high-score.firebaseapp.com",
            projectId: "tetris-high-score",
            storageBucket: "tetris-high-score.firebasestorage.app",
            messagingSenderId: "461179961364",
            appId: "1:461179961364:web:4b930a79a0e562dcc1a701"
        };

        // Initialize Firebase Backend
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        // --- CANVAS SETUP ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(30, 30);

        const nextCanvas = document.getElementById('next-piece');
        const nextContext = nextCanvas.getContext('2d');
        nextContext.scale(30, 30);

        // GAME & STORAGE STATE
        let score = 0, level = 1, totalLines = 0, isGameOver = false, isPaused = false;
        let dropCounter = 0, dropInterval = 1000, lastTime = 0, nextMatrix = null;

        // Load High Scores from Local Browser Storage (Defaults to empty array)
        let cloudHighScores = [];
        const SCORE_THRESHOLD = 300; // Must beat 20k to enter score

        const colors = [null, '#9b59b6', '#f1c40f', '#e67e22', '#3498db', '#1abc9c', '#2ecc71', '#e74c3c'];

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        const board = createMatrix(10, 20);
        const player = { pos: { x: 0, y: 0 }, matrix: null };

        // DRAWING
        function drawMatrix(matrix, offset, ctx = context) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(board, { x: 0, y: 0 });
            drawMatrix(player.matrix, player.pos);
        }

        function drawNextPiece() {
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            const offset = { x: (4 - nextMatrix[0].length) / 2, y: (4 - nextMatrix.length) / 2 };
            drawMatrix(nextMatrix, offset, nextContext);
        }

        // FIREBASE CLOUD LOGIC
        function updateHighScoreUI() {
            const list = document.getElementById('score-list');
            list.innerHTML = '';

            if (cloudHighScores.length === 0) {
                list.innerHTML = '<li><span>No scores yet!</span></li>';
                return;
            }

            cloudHighScores.forEach(entry => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${entry.name}</span> <span style="color: #3498db; font-weight: bold;">${entry.score}</span>`;
                list.appendChild(li);
            });
        }

        async function fetchHighScores() {
            try {
                const q = query(collection(db, "highscores"), orderBy("score", "desc"), limit(5));
                const querySnapshot = await getDocs(q);

                cloudHighScores = [];
                querySnapshot.forEach((doc) => {
                    cloudHighScores.push(doc.data());
                });

                updateHighScoreUI();
            } catch (error) {
                console.error("Firebase Read Error:", error);
                document.getElementById('score-list').innerHTML = '<li><span>Cloud error</span></li>';
            }
        }

        async function saveHighScore() {
            let name = document.getElementById('player-name').value.trim().toUpperCase() || 'MR S';

            document.getElementById('name-input-section').classList.add('hidden');
            document.getElementById('save-score-btn').innerText = "Saving...";

            try {
                await addDoc(collection(db, "highscores"), {
                    name: name,
                    score: score
                });
                await fetchHighScores();
            } catch (error) {
                console.error("Firebase Write Error:", error);
            }

            document.getElementById('restart-btn').classList.remove('hidden');
        }

        document.getElementById('save-score-btn').addEventListener('click', saveHighScore);

        // MECHANICS
        function collide(board, player) {
            const m = player.matrix, o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(board, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) board[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function updateScore(linesCleared) {
            if (linesCleared > 0) {
                const basePoints = [0, 40, 100, 300, 1200];
                score += basePoints[linesCleared] * level;
                document.getElementById('score').innerText = score;

                totalLines += linesCleared;
                level = Math.floor(totalLines / 10) + 1;
                document.getElementById('level').innerText = level;
                dropInterval = Math.max(100, 1000 - (level - 1) * 80);
            }
        }

        function boardSweep() {
            let linesCleared = 0;
            outer: for (let y = board.length - 1; y >= 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) continue outer;
                }
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;
                linesCleared++;
            }
            updateScore(linesCleared);
        }

        function triggerGameOver() {
            isGameOver = true;
            document.getElementById('final-score').innerText = score;


            // Check if score beats threshold AND is higher than the 5th place cloud score
            const qualifies = score >= SCORE_THRESHOLD &&
                (cloudHighScores.length < 5 || score > cloudHighScores[cloudHighScores.length - 1].score);

            if (qualifies) {
                document.getElementById('name-input-section').classList.remove('hidden');
                document.getElementById('restart-btn').classList.add('hidden'); // Hide restart until saved
                document.getElementById('game-over-title').style.color = '#f1c40f'; // Turn title Gold
            } else {
                document.getElementById('name-input-section').classList.add('hidden');
                document.getElementById('restart-btn').classList.remove('hidden');
                document.getElementById('game-over-title').style.color = '#e74c3c'; // Normal Red
            }

            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            if (isPaused) {
                document.getElementById('pause-screen').classList.remove('hidden');
                document.getElementById('pause-btn').innerText = 'Resume';
            } else {
                document.getElementById('pause-screen').classList.add('hidden');
                document.getElementById('pause-btn').innerText = 'Pause';
                requestAnimationFrame((time) => { lastTime = time; update(time); });
            }
        }

        function resetGame() {
            board.forEach(row => row.fill(0));
            score = 0; level = 1; totalLines = 0; dropInterval = 1000;
            isGameOver = false; isPaused = false; nextMatrix = null;
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('pause-screen').classList.add('hidden');
            document.getElementById('pause-btn').innerText = 'Pause';
            playerReset(); update();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (nextMatrix === null) nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = nextMatrix;
            nextMatrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            drawNextPiece();
            player.pos.y = 0;
            player.pos.x = (Math.floor(board[0].length / 2)) - (Math.floor(player.matrix[0].length / 2));
            if (collide(board, player)) triggerGameOver();
        }

        // --- NEW HARD DROP FUNCTION ---
        function playerHardDrop() {
            // Keep moving down until collision
            while (!collide(board, player)) {
                player.pos.y++;
            }
            player.pos.y--; // Step back up one out of the floor
            merge(board, player);
            boardSweep();
            playerReset();
            dropCounter = 0;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--; merge(board, player); boardSweep(); playerReset();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(board, player)) player.pos.x -= dir;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(board, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir); player.pos.x = pos; return;
                }
            }
        }

        // --- CONTROLS WIRE-UP ---

        document.addEventListener('keydown', event => {
            if (event.code === 'KeyP') { togglePause(); return; }
            if (isGameOver || isPaused) return;

            // Prevent default scrolling for all game keys (including Spacebar)
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(event.code)) {
                event.preventDefault();
            }

            if (event.code === 'ArrowLeft' || event.code === 'KeyA') playerMove(-1);
            else if (event.code === 'ArrowRight' || event.code === 'KeyD') playerMove(1);
            else if (event.code === 'ArrowDown' || event.code === 'KeyS') playerDrop();
            else if (event.code === 'ArrowUp' || event.code === 'KeyW') playerRotate(1);
            else if (event.code === 'Space') playerHardDrop(); // The new Hard Drop!
        });

        document.getElementById('restart-btn').addEventListener('click', resetGame);
        document.getElementById('pause-btn').addEventListener('click', () => {
            document.getElementById('pause-btn').blur();
            togglePause();
        });

        function setupTouch(id, action, isContinuous = false) {
            const btn = document.getElementById(id);
            if (!btn) return;

            if (!isContinuous) {
                btn.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    if (!isGameOver && !isPaused) action();
                });
            } else {
                let intervalId;
                const startAction = (e) => {
                    e.preventDefault();
                    if (isGameOver || isPaused) return;
                    action();
                    intervalId = setInterval(action, 50);
                };
                const stopAction = (e) => {
                    e.preventDefault();
                    clearInterval(intervalId);
                };
                btn.addEventListener('pointerdown', startAction);
                btn.addEventListener('pointerup', stopAction);
                btn.addEventListener('pointerout', stopAction);
                btn.addEventListener('pointercancel', stopAction);
            }
        }

        setupTouch('btn-left', () => playerMove(-1));
        setupTouch('btn-right', () => playerMove(1));
        setupTouch('btn-down', () => playerDrop(), true);
        setupTouch('btn-rotate', () => playerRotate(1));
        setupTouch('btn-hard-drop', () => playerHardDrop()); // Mobile Hard Drop

        // THE LOOP
        function update(time = 0) {
            if (isGameOver || isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        // INIT CLOUD AND START
        fetchHighScores();
        playerReset();
        update();
    </script>
</body>

</html>
